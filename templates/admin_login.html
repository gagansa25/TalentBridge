<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="login-box">

    <h2>Admin Login</h2>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>
        <a href="/" class="back-btn">
    ← Back to Home
</a>

    </form>

</div>

</body>
</html>
