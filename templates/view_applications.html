<!DOCTYPE html>
<html>
<head>
    <title>Applications</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/view_applications.css') }}">
</head>
<body>

<div class="container">

    <h1>Job Applications</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Student Email</th>
            <th>Company</th>
            <th>Job Title</th>
            <th>Applied Date</th>
            <th>Action</th>
        </tr>

        {% for app in applications %}

        <tr>

            <td>{{ app[0] }}</td>
            <td>{{ app[1] }}</td>
            <td>{{ app[2] }}</td>
            <td>{{ app[3] }}</td>
            <td>{{ app[4] }}</td>
            <td>
    <a href="/delete_application/{{ app[0] }}"
       class="delete-btn">
       Delete
    </a>
</td>


        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
