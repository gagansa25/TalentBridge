<!DOCTYPE html>
<html>
<head>
    <title>My Applications</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f7fafc;
            color: #0f172a;
            padding: 24px;
        }
        h2 {
            margin-bottom: 18px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 10px 24px rgba(15,23,42,.08);
        }
        th, td {
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            text-align: left;
        }
        th {
            background: #2563eb;
            color: white;
        }
        .status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: capitalize;
        }
        .status.placed {
            background: #dcfce7;
            color: #166534;
        }
        .status.failed {
            background: #fee2e2;
            color: #991b1b;
        }
        .status.other {
            background: #e2e8f0;
            color: #334155;
        }
    </style>
</head>
<body>

<h2>My Applications</h2>

<table>

<tr>
    <th>Company</th>
    <th>Job Title</th>
    <th>Applied Date</th>
    <th>Status</th>
</tr>

{% for app in applications %}

<tr>
    <td>{{ app[2] }}</td>
    <td>{{ app[3] }}</td>
    <td>{{ app[4] }}</td>
    <td><span class="status {{ app[5]|lower|replace(' ', '-') }}">{{ app[5] }}</span></td>
</tr>

{% endfor %}

</table>

</body>
</html>
