<!DOCTYPE html>
<html>
<head>
    <title>Company Login</title>
    <link rel="stylesheet"
href="{{ url_for('static', filename='css/company_auth.css') }}">
</head>
<body>
<div class="container">

    <h1>Company Login</h1>

    <form method="POST">

        <div class="input-group">
            <input type="email"
                   name="email"
                   placeholder="Company Email"
                   required>
        </div>

        <div class="input-group">
            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>
        </div>

        <button type="submit">
            Login
        </button>
        <a href="/" class="back-btn">
    ← Back to Home
</a>

    </form>

    <div class="bottom-text">
        New Company?
        <a href="/company_register">Register</a>
    </div>

</div>
</body>
</html>
