<!DOCTYPE html>
<html>
<head>
    <title>Add New Job</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/add_job.css') }}">
</head>
<body>

<div class="container">

    <h1>Add New Job</h1>

    <form method="POST">

        <div class="form-group">
            <input type="text"
                   name="company_name"
                   placeholder="Company Name"
                   required>
        </div>

        <div class="form-group">
            <input type="text"
                   name="job_title"
                   placeholder="Job Title"
                   required>
        </div>

        <div class="form-group">
            <textarea name="job_description"
                      placeholder="Job Description"
                      required></textarea>
        </div>

        <div class="form-group">
            <input type="text"
                   name="location"
                   placeholder="Location"
                   required>
        </div>

        <div class="form-group">
            <input type="text"
                   name="salary"
                   placeholder="Salary"
                   required>
        </div>

        <div class="form-group">
            <input type="date"
                   name="deadline"
                   required>
        </div>

        <button type="submit">
            Add Job
        </button>

    </form>

    <a href="/admin_dashboard" class="back-btn">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
