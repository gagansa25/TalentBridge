<!DOCTYPE html>
<html>
<head>
    <title>Manage Students</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            padding:20px;
        }

        h1{
            color:#2563eb;
        }

        table{
            width:100%;
            background:white;
            border-collapse:collapse;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        th{
            background:#2563eb;
            color:white;
        }

        th,td{
            padding:12px;
            border:1px solid #ddd;
            text-align:left;
        }

        .resume-btn{
            background:#22c55e;
            color:white;
            padding:8px 12px;
            text-decoration:none;
            border-radius:5px;
        }

        .resume-btn:hover{
            background:#16a34a;
        }
    </style>
</head>
<body>

<h1>Registered Students</h1>

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Course</th>
    <th>Skills</th>
    <th>Resume</th>
</tr>

{% for student in students %}

<tr>

    <td>{{ student[0] }}</td>

    <td>{{ student[1] }}</td>

    <td>{{ student[2] }}</td>

    <td>{{ student[4] }}</td>

    <td>{{ student[5] }}</td>

    <td>

        {% if student[6] %}

        <a class="resume-btn"
           href="{{ url_for('uploaded_file', filename=student[6]) }}"
           target="_blank">
           View Resume
        </a>

        {% else %}

        Not Uploaded

        {% endif %}

    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
