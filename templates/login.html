<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="login-container">

    <h1>Student Login</h1>

    <form method="POST" action="/login">

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <a href="/" class="back-btn">
        ← Back to Home
    </a>

    <div class="register-link">
        New Student?
        <a href="/register">Register Here</a>
    </div>

</div>

</body>
</html>
